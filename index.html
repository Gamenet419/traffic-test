<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Light Simulator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="traffic-box">
        <div class="light red"></div>
        <div class="light yellow"></div>
        <div class="light green"></div>
    </div>

    <div class="timer-controls">

        <div class="timer-row">
            <label for="redTime">Red (sec):</label>
            <input type="number" id="redTime" min="1" value="3">
        </div>

        <div class="timer-row">
            <label for="yellowTime">Yellow (sec):</label>
            <input type="number" id="yellowTime" min="1" value="2">
        </div>

        <div class="timer-row">
            <label for="greenTime">Green (sec):</label>
            <input type="number" id="greenTime" min="1" value="3">
        </div>

    </div>

    <div class="controls">
        <button id="start">Start</button>
        <button id="pause">Pause</button>
        <button id="stop">Stop</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
